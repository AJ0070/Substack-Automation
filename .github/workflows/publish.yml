name: Generate and Publish Substack Post

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUBSTACK_EMAIL: ${{ secrets.SUBSTACK_EMAIL }}
          SUBSTACK_PASSWORD: ${{ secrets.SUBSTACK_PASSWORD }}
          SUBSTACK_PUBLICATION_URL: ${{ secrets.SUBSTACK_PUBLICATION_URL }}
          PUBLISH_MODE: ${{ vars.PUBLISH_MODE || 'draft' }}
          HEADLESS: "true"
          MAX_RETRIES: "6"
          GEMINI_RETRY_INITIAL_DELAY_SECONDS: "10"
          GEMINI_RETRY_MAX_DELAY_SECONDS: "90"
        run: python main.py

      - name: Upload logs and generated articles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: substack-automation-output
          path: |
            articles/
            logs/
